spring:
  datasource:
    url: jdbc:duckdb:data/imdb.duckdb
    driver-class-name: org.duckdb.DuckDBDriver
imdb:
  data:
    path: data
    base-url: https://datasets.imdbws.com/
    files:
      - name.basics.tsv.gz
      - title.akas.tsv.gz
      - title.basics.tsv.gz
      - title.crew.tsv.gz
      - title.episode.tsv.gz
      - title.principals.tsv.gz
      - title.ratings.tsv.gz
    #TODO
    format:
      base: tsv.gz
      target: parquet

